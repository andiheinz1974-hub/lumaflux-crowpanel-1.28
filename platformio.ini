; LumaFlux CrowPanel 1.28 WLED Controller
; ESP32-S3, GC9A01 240x240 SPI display, CST816D touch, rotary encoder

[platformio]
default_envs = crowpanel_128_espidf
src_dir = main

[env:crowpanel_128_espidf]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = espidf
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder, time
board_build.flash_mode = dio
board_build.f_cpu = 240000000L
board_build.partitions = partitions/elecrow_s3.csv
board_build.sdkconfig_defaults = sdkconfig.defaults
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
  -DUI_STRESS_TEST_ENABLED=0
  ; --- AP-only Pairing (CP128 → WLED AP) ------------------------------------
  ; SSID/PSK and host of the WLED soft-AP. CP128 NEVER joins the home WLAN.
  ; The BSSID is auto-discovered at first boot via single-result SSID scan and
  ; persisted in NVS; afterwards the STA is locked to that exact MAC.
  ; Reset via Settings → "Pairing zurücksetzen" or wifi_manager_clear_pairing().
  -DWLED_AP_SSID=\"QuinLED-AP\"
  -DWLED_AP_PSK=\"wled1234\"
  -DWLED_HOST_IP=\"4.3.2.1\"
  -DWLED_AP_CHANNEL=0
  -DWLED_LOCK_AP=1
