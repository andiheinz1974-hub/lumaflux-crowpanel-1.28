esphome:                                       # ESPHome core configuration block
  name: rotary-screen-128-display              # Device unique identifier
  friendly_name: Rotary_Screen_1.28_Display    # Human-readable device name
  platformio_options:                           # PlatformIO build customization
    build_flags: "-DBOARD_HAS_PSRAM"           # Enable PSRAM support flag
    board_build.esp-idf.memory_type: qio_opi    # Set PSRAM memory interface type
    board_build.flash_mode: dio                 # Set flash communication mode to DIO
  on_boot:                                      # Automation triggered on device boot
    priority: 800                               # Boot priority (higher = earlier execution)
    then:                                       # Sequence of actions to execute
      - logger.log: "Backlight ON"              # Log message to serial/ESPHome logs
      - output.turn_on: gpio_3_backlight_pwm    # Activate backlight PWM output
      - delay: 200ms
      - output.turn_off: power_light
      - output.turn_on: out1
      - output.turn_on: out2

esp32:                                          # ESP32 hardware configuration
  board: esp32-s3-devkitc-1                     # Specify ESP32 board model
  framework:                                    # Firmware framework settings
    type: esp-idf                               # Use ESP-IDF framework (instead of Arduino)
    version: recommended                       # Use stable recommended ESP-IDF version

psram:                                          # PSRAM (external RAM) configuration
  mode: octal                                   # Use octal mode for PSRAM (8-bit)
  speed: 80MHz                                  # Set PSRAM clock speed to 80MHz

logger:                                         # Enable serial/OTA logging functionality

api:                                            # Home Assistant API integration
  encryption:                                   # Enable API encryption
    key: "8b5jwOcT6EgrVNxIwglnvruzf2iNw8vBzuFkIxcxWgY="  # Encryption key for secure communication

ota:                                            # Over-the-Air firmware update config
  - platform: esphome                           # Use ESPHome native OTA platform
    password: "93cb9d390324fc2c57ee56237810090a" # Password for OTA authentication

wifi:                                           # WiFi connection configuration
  ssid: !secret wifi_ssid                       # WiFi SSID (from secrets.yaml)
  password: !secret wifi_password               # WiFi password (from secrets.yaml)

  ap:                                           # Fallback access point (if WiFi fails)
    ssid: "Rotary-Screen-128-Display"           # AP network name
    password: "9XFEMJU11HLh"                    # AP authentication password

captive_portal:                                 # Enable captive portal for WiFi setup

# ================= Backlight control =================
output:                                         # Output component configuration
  - platform: ledc                              # Use ESP32 LEDC (hardware PWM)
    pin: GPIO46                                 # GPIO pin for backlight PWM
    id: gpio_3_backlight_pwm                    # Unique ID for backlight output
  - platform: gpio
    id: power_light
    pin: GPIO40
  - platform: gpio
    id: out1
    pin: GPIO1
  - platform: gpio
    id: out2
    pin: GPIO2

light:                                          # Light component (wraps output)
  - platform: monochromatic                     # Single-color dimmable light type
    id: back_light                              # Unique ID for backlight light
    output: gpio_3_backlight_pwm                # Link to PWM output component
    restore_mode: ALWAYS_ON                     # Always turn on after power cycle

# ================= SPI screen =================
spi:                                            # SPI bus configuration
  id: spi_bus                                   # Unique ID for SPI bus
  mosi_pin: 11                                  # SPI MOSI (data out) pin
  clk_pin: 10                                   # SPI clock pin

display:                                        # Display component configuration
  - platform: ili9xxx                           # Use ILI9XXX display driver
    id: round_display                           # Unique ID for display
    model: GC9A01A                              # Specific display model (1.28" round)
    cs_pin: GPIO9                               # SPI chip select pin
    dc_pin: GPIO3                               # Data/command selection pin
    reset_pin: GPIO14                           # Display reset pin
    invert_colors: true                         # Invert display color polarity
    rotation: 0                                 # Display rotation (0 degrees)

# ================= font =================
font:                                           # Font configuration for display
  - file: "gfonts://Roboto"                     # Load Roboto font from Google Fonts
    id: roboto24                                # Unique ID for 24px Roboto font
    size: 24                                    # Font size in pixels

# ================= LVGL =================
lvgl:                                           # LVGL graphics library config
  displays:                                     # Link LVGL to display component
    - round_display                             # Use the round_display component

  default_font: roboto24                        # Set default font for LVGL widgets
  disp_bg_color: white                          # ★ Set display background color to white

  style_definitions:                            # Define reusable LVGL styles
    - id: hello_style                           # Unique ID for style
      text_font: roboto24                       # Use 24px Roboto font
      text_color: 0x000000                     # ★ Set text color to black (hex)
      bg_opa: TRANSP                            # Set background opacity to transparent
      align: center                             # Align text to center
      
  pages:                                        # Define LVGL UI pages/screens
    - id: hello_page                            # Unique ID for page
      widgets:                                  # UI elements on this page
        - label:                                # Add text label widget
            id: hello_label                     # Unique ID for label
            text: "Hello World!"                # Text to display
            styles: hello_style                 # Apply hello_style to label
            align: CENTER                       # Align label to center of display