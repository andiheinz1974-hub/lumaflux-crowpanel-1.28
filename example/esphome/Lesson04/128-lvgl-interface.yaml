esphome:
  name: 128-lvgl-interface  # Set device unique ID for ESPHome
  friendly_name: 1.28_LVGL_Interface  # Set friendly name for device display
  platformio_options:  # PlatformIO compile options for ESP32-S3
    build_flags: "-DBOARD_HAS_PSRAM"  # Enable PSRAM for the board
    board_build.esp-idf.memory_type: qio_opi  # Set PSRAM memory type to QIO_OPI
    board_build.flash_mode: dio  # Set flash mode to DIO for higher speed

  on_boot:  # Execute actions when device boots up (high priority)
    priority: 800  # Boot priority (800 = high, run early in boot process)
    then:  # Sequential boot action list
      - logger.log: "Backlight ON"  # Log boot info to serial port
      - output.turn_on: gpio_3_backlight_pwm  # Turn on backlight PWM output pin
      - delay: 200ms  # Delay 200ms for hardware stabilization
      - output.turn_off: power_light  # Turn off power indicator LED
      - output.turn_on: out1  # Turn on custom GPIO output out1
      - output.turn_on: out2  # Turn on custom GPIO output out2
      - delay: 500ms  # Delay 500ms for peripheral initialization
      
      - lambda: |-
          id(encoder_ready) = false; // Set encoder status to not ready for operation
          id(brightness_value) = 50; // Initialize global brightness value to 50 (0-100 range)
          id(knob).publish_state(0); // Reset rotary encoder's state to 0 (baseline)
      
      - light.turn_on:  # Turn on backlight light component (ESPHome native)
          id: back_light  # Target backlight light component ID
          brightness: 0.5  # Set initial backlight brightness to 50%
          
      - lambda: |-
          lv_arc_set_value(id(arc_brightness), id(brightness_value)); // Set LVGL arc initial value match brightness
          char buf[10]; // Define 10-byte char buffer for percentage string storage
          snprintf(buf, sizeof(buf), "%d%%", id(brightness_value)); // Format int brightness to "X%" string (safe)
          lv_label_set_text(id(lbl_brightness), buf); // Update brightness label with formatted string
          lv_refr_now(NULL); // Force LVGL to refresh screen immediately (no delay)
      
      - delay: 200ms  # Delay 200ms for LVGL interface initialization
      - lambda: |-
          id(encoder_ready) = true; // Set encoder status to ready for normal operation

esp32:  # ESP32 chip core configuration
  board: esp32-s3-devkitc-1  # Specify ESP32 board model (ESP32-S3 DevKitC-1)
  framework:  # Set ESP32 underlying framework
    type: esp-idf  # Use ESP-IDF framework (recommended for ESP32-S3)
    version: recommended  # Use latest recommended ESP-IDF version
  
psram:  # Configure external PSRAM (required for LVGL smooth rendering)
  mode: octal  # Set PSRAM to octal mode (8-wire, ESP32-S3 standard)
  speed: 80MHz  # Set PSRAM clock speed to 80MHz

# Enable logging
logger:  # Serial port logging configuration
  level: VERY_VERBOSE  # Set log level to very verbose (full debug information)

# Enable Home Assistant API
api:  # ESPHome API for Home Assistant communication (bidirectional)
  encryption:  # Enable API encryption for security
    key: "MzSI3XFDkWIC7i1Mvw15+GEev/FIqiSOR2Dd++3Gd5I="  # API encryption key (auto-generated)

ota:  # Over-The-Air firmware update configuration
  - platform: esphome  # Use ESPHome native OTA platform
    password: "6d52ed56242d7b039362412472cd405c"  # OTA update authentication password

wifi:  # WiFi network connection configuration
  ssid: "elecrow_5G1"  # Target WiFi SSID (network name)
  password: "elecrow2014"  # Target WiFi connection password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:  # Fallback access point when WiFi connection fails
    ssid: "128-Lvgl-Interface"  # Fallback AP network name
    password: "fTimyu5hdyFb"  # Fallback AP connection password

captive_portal:  # Enable captive portal for AP WiFi configuration (web-based)

globals:  # Define global variables for ESPHome custom logic (cross-component)
  - id: brightness_value  # Global variable ID for backlight brightness
    type: int  # Variable data type: integer
    restore_value: false  # Do not restore value after device reboot
    initial_value: "50"  # Initial value set to 50 (0-100 brightness range)

  - id: encoder_ready  # Global variable ID for encoder working status
    type: bool  # Variable data type: boolean (true/false)
    restore_value: false  # Do not restore value after device reboot
    initial_value: "false"  # Initial state: encoder not ready (boot stage)

output:  # Define output components (PWM/GPIO) for hardware control
  - platform: ledc  # Use ESP32 LEDC PWM platform (for analog dimming)
    pin: GPIO46  # PWM output pin for screen backlight
    id: gpio_3_backlight_pwm  # Unique ID for backlight PWM output
    frequency: 5000Hz  # Set PWM frequency to 5000Hz (no flicker for LED)

  - platform: gpio  # Use GPIO digital output platform (on/off control)
    id: power_light  # Unique ID for power indicator LED
    pin: GPIO40  # GPIO pin for power indicator LED

  - platform: gpio  # Use GPIO digital output platform (on/off control)
    id: out1  # Unique ID for custom GPIO output 1
    pin: GPIO1  # GPIO pin for custom output 1

  - platform: gpio  # Use GPIO digital output platform (on/off control)
    id: out2  # Unique ID for custom GPIO output 2
    pin: GPIO2  # GPIO pin for custom output 2

light:  # Define ESPHome light component (based on output)
  - platform: monochromatic  # Monochromatic light (single brightness control)
    name: "Backlight"  # Light name for Home Assistant entity
    output: gpio_3_backlight_pwm  # Link to backlight PWM output component
    id: back_light  # Unique ID for backlight light component
    restore_mode: ALWAYS_ON  # Always turn on backlight after device reboot

sensor:  # Define sensor components (input devices)
  - platform: rotary_encoder  # Rotary encoder sensor platform (AB phase)
    id: knob  # Unique ID for rotary encoder sensor
    name: "Encoder"  # Encoder name for Home Assistant entity
    pin_a:  # Encoder A phase pin configuration
      number: 45  # A phase pin number (GPIO45)
      mode:  # Set pin working mode
        input: true  # Configure pin as input
        pullup: true  # Enable internal pull-up resistor (anti-noise)
    pin_b:  # Encoder B phase pin configuration
      number: 42  # B phase pin number (GPIO42)
      mode:  # Set pin working mode
        input: true  # Configure pin as input
        pullup: true  # Enable internal pull-up resistor (anti-noise)
    resolution: 1  # Encoder resolution (1 pulse per mechanical step)

    filters:  # Data filters for encoder signal (anti-noise)
      - debounce: 20ms  # Debounce 20ms to filter hardware jitter/noise
      - lambda: return round(x);  # Round float state value to integer

    on_value:  # Trigger action when encoder state value changes
      then:
        - lambda: |-
            if (!id(encoder_ready)) return; // Exit if encoder not ready (boot stage/initialization)
            static bool first_run = true; // Static flag: mark first encoder trigger (keep value)
            static int last_encoder = 0; // Static variable: store last encoder state (keep value)
            int current = (int) id(knob).state; // Get current encoder state, cast float to int

            if (first_run) { // First time encoder triggers: initialize baseline
              last_encoder = current; // Set baseline with current encoder value
              first_run = false; // Update flag: first run finished
              return; // Exit without brightness adjustment
            }

            int delta = current - last_encoder; // Calculate rotation delta (judge direction/speed)
            last_encoder = current; // Update last state to current (for next calculation)
            if (delta == 0) return; // Exit if no valid rotation (hardware noise/false trigger)

            if (delta < 0) { // Counterclockwise rotation (delta negative): decrease brightness
              id(brightness_value) -= 5; // Decrease brightness by 5 steps (0-100)
            } else { // Clockwise rotation (delta positive): increase brightness
              id(brightness_value) += 5; // Increase brightness by 5 steps (0-100)
            }

            if (id(brightness_value) < 0) id(brightness_value) = 0; // Limit brightness to minimum 0
            if (id(brightness_value) > 100) id(brightness_value) = 100; // Limit brightness to maximum 100

            float level = id(brightness_value) / 100.0f; // Convert 0-100 to 0.0-1.0 PWM level (float calc)
            id(gpio_3_backlight_pwm).set_level(level); // Set backlight PWM output with calculated level

            lv_arc_set_value(id(arc_brightness), id(brightness_value)); // Sync brightness to LVGL arc component
            char buf[10]; // Define 10-byte char buffer for percentage string
            snprintf(buf, sizeof(buf), "%d%%", id(brightness_value)); // Format int to "X%" string (safe)
            lv_label_set_text(id(lbl_brightness), buf); // Update center label with new percentage string
            lv_refr_now(NULL); // Force LVGL screen refresh (instant UI update)

# ================= Fonts & Images (LVGL Resources) =================
font:  # Define fonts for LVGL display interface
  - file: "gfonts://Montserrat"  # Load Montserrat font from Google Fonts
    id: montserrat_20  # Unique ID for 20px Montserrat font
    size: 20  # Font pixel size
  - file: "gfonts://Montserrat"  # Load Montserrat font from Google Fonts
    id: montserrat_36  # Unique ID for 36px Montserrat font
    size: 36  # Font pixel size (large for main display)
  - file: "gfonts://Montserrat"  # Load Montserrat font from Google Fonts
    id: montserrat_14  # Unique ID for 14px Montserrat font
    size: 14  # Font pixel size
  - file: "gfonts://Montserrat"  # Load Montserrat font from Google Fonts
    id: montserrat_12  # Unique ID for 12px Montserrat font
    size: 12  # Font pixel size (small for title)

image:  # Define images for LVGL display interface
  - file: "bj_light_128_1.png"  # Load background image from local configuration folder      
    id: img_bg_light  # Unique ID for background image
    resize: 240x240  # Resize image to screen resolution (240x240)
    type: RGB565  # Set image color type (GC9A01A screen compatible)

spi:  # Define SPI bus for display communication (SPI protocol)
  id: spi_bus  # Unique ID for SPI bus
  mosi_pin: 11  # SPI MOSI (data) pin (GPIO11)
  clk_pin: 10  # SPI CLK (clock) pin (GPIO10)

display:  # Define display component (1.28" round GC9A01A)
  - platform: ili9xxx  # ILI9XXX series driver (compatible with GC9A01A)
    id: round_display  # Unique ID for round display (link to LVGL)
    model: GC9A01A  # Exact display model (1.28" round SPI screen)
    cs_pin: GPIO9  # SPI CS (chip select) pin (GPIO9)
    dc_pin: GPIO3  # DC (data/command) pin (GPIO3)
    reset_pin: GPIO14  # Display hardware reset pin (GPIO14)
    invert_colors: true  # Invert display colors (required for GC9A01A)
    show_test_card: false  # Do not show LVGL test card on boot
    rotation: 0  # Display rotation angle (0 degrees, no rotation)
    update_interval: 10ms  # Default display update interval (10ms)

lvgl:  # LVGL graphics library core configuration
  displays:
    - round_display  # Associate LVGL with the 1.28" round display
  buffer_size: 50%  # Set LVGL buffer size to 50% PSRAM (smooth rendering)

  widgets:  # Define LVGL UI widgets (drawn in order: bottom → top)
    - image:  # Background image widget (bottom layer)
        align: CENTER  # Align widget to screen center
        id: img_bg  # Unique ID for background image widget
        src: img_bg_light  # Link to preloaded background image
        width: 240  # Image width (match screen resolution)
        height: 240  # Image height (match screen resolution)
        antialias: true  # Enable antialiasing (smooth image edges)

    - label:  # Title label widget (Brightness, second layer)
        align: CENTER  # Align widget to screen center
        id: lbl_title  # Unique ID for title label
        y: -40  # Y axis offset (40px up from center)
        text_font: montserrat_12  # Use 12px Montserrat font
        text: "Brightness"  # Label display text
        text_color: 0xFFFFFF  # Text color (white, RRGGBB hex)
        text_opa: "100%"  # Text opacity (100% fully visible)

    - arc:  # Brightness arc widget (core UI, third layer)
        align: CENTER  # Align widget to screen center
        id: arc_brightness  # Unique ID for brightness arc (link to logic)
        value: 50  # Initial arc value (match default brightness)
        min_value: 0  # Arc minimum value (0% brightness)
        max_value: 100  # Arc maximum value (100% brightness)
        start_angle: 135  # Arc start angle (135 degrees)
        end_angle: 45  # Arc end angle (45 degrees) → 270° arc (round screen fit)
        width: 160  # Arc widget width (pixels)
        height: 160  # Arc widget height (pixels)
        
        arc_color: 0x1A1A1A  # Arc background color (dark gray, RRGGBB)
        arc_width: 12  # Arc background line width (pixels)
        arc_rounded: true  # Rounded corners for arc background
        
        indicator:  # Arc progress indicator (current brightness)
          arc_color: 0x00D2FF  # Indicator color (sky blue, RRGGBB)
          arc_width: 12  # Indicator line width (pixels)
          arc_rounded: true  # Rounded corners for indicator
          
        knob:  # Arc indicator knob (end of progress bar)
          bg_color: 0xFFFFFF  # Knob background color (white)
          bg_opa: "100%"  # Knob opacity (100% fully visible)
          width: 20  # Knob width (pixels)
          height: 20  # Knob height (pixels)
          radius: 10  # Knob corner radius (10px = perfect circle)

    - label:  # Brightness percentage label (top layer, most prominent)
        align: CENTER  # Align widget to screen center
        id: lbl_brightness  # Unique ID for brightness label (link to logic)
        text_font: montserrat_36  # Use 36px Montserrat font (large)
        text: "50%"  # Initial display text (match default brightness)
        text_color: 0xFFFFFF  # Text color (white, RRGGBB hex)
        text_opa: "100%"  # Text opacity (100% fully visible)